# 服务端口
server.port=8081
server.servlet.context-path=/

# 应用名称
spring.application.name=TelecomPro

# 日志级别
logging.level.com.telecom=DEBUG

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Thymeleaf 配置
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false  
transfer.service.address=http://localhost:8080/UnicomPro/services/TransferSupportService
spring.web.resources.static-locations=classpath:/static/

mobile.datasource.url=jdbc:mysql://localhost:3306/mobile?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
mobile.datasource.username=root
mobile.datasource.password=123456
mobile.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

unicom.datasource.url=jdbc:mysql://localhost:3306/unicom?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
unicom.datasource.username=root
unicom.datasource.password=123456
unicom.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

telecom.service.address=http://localhost:8081/services/TransferSupportService

