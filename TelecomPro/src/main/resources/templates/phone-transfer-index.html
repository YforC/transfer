<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>携号转网</title>
    <style>
        :root {
            --surface: #dfe5ec;
            --surface-soft: #e7ecf2;
            --text: #314252;
            --muted: #6f7f90;
            --accent: #58738f;
            --shadow-high: -14px -14px 30px rgba(255,255,255,.9);
            --shadow-low: 14px 14px 30px rgba(163,177,198,.55);
            --shadow-inset: inset 8px 8px 16px rgba(163,177,198,.45), inset -8px -8px 16px rgba(255,255,255,.9);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: radial-gradient(circle at top left, #edf1f6 0%, var(--surface) 45%, #d4dbe3 100%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(100%, 460px);
            padding: 30px;
            border-radius: 32px;
            background: var(--surface);
            box-shadow: var(--shadow-high), var(--shadow-low);
        }

        .brand {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border-radius: 24px;
            background: var(--surface);
            box-shadow: var(--shadow-inset);
            display: grid;
            place-items: center;
            color: var(--accent);
            font-size: 24px;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 30px;
            letter-spacing: 2px;
        }

        .sub {
            margin: 10px 0 26px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
        }

        .switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 22px;
        }

        .switch label {
            display: block;
            cursor: pointer;
        }

        .switch input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .switch span {
            display: block;
            min-height: 48px;
            padding: 14px 12px;
            border-radius: 18px;
            text-align: center;
            color: var(--muted);
            background: var(--surface);
            box-shadow: var(--shadow-high), var(--shadow-low);
            transition: .2s ease;
        }

        .switch input:checked + span {
            color: var(--text);
            box-shadow: var(--shadow-inset);
        }

        .field {
            margin-bottom: 22px;
        }

        .field label {
            display: block;
            margin: 0 0 10px 6px;
            font-size: 13px;
            color: var(--muted);
        }

        .field input {
            width: 100%;
            min-height: 54px;
            border: 0;
            outline: none;
            border-radius: 20px;
            padding: 0 18px;
            font-size: 18px;
            color: var(--text);
            background: var(--surface);
            box-shadow: var(--shadow-inset);
        }

        .field input:focus {
            box-shadow: var(--shadow-inset), 0 0 0 3px rgba(88,115,143,.18);
        }

        .action {
            width: 100%;
            min-height: 56px;
            border: 0;
            border-radius: 20px;
            font-size: 16px;
            color: #f7fbff;
            background: linear-gradient(145deg, #6d88a3, #4f677f);
            box-shadow: 10px 10px 22px rgba(145,157,175,.55), -10px -10px 22px rgba(255,255,255,.8);
            cursor: pointer;
        }

        .action:hover { transform: translateY(-1px); }
        .action:active { box-shadow: var(--shadow-inset); transform: translateY(0); }
        .action:focus-visible { outline: 3px solid rgba(88,115,143,.28); outline-offset: 4px; }

        .service {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 12px;
        }

        @media (max-width: 520px) {
            .shell { padding: 24px 18px; border-radius: 26px; }
            h1 { font-size: 26px; }
            .switch { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="brand">MNP</div>
    <h1>携号转网</h1>
    <div class="sub">输入手机号即可</div>

    <form th:action="@{/transfer/transferNumber}" method="post" th:object="${cellPhoneInfo}">
        <div class="switch" role="radiogroup" aria-label="目标运营商">
            <label>
                <input type="radio" th:field="*{targetCarrier}" value="UNICOM" />
                <span>转入联通</span>
            </label>
            <label>
                <input type="radio" th:field="*{targetCarrier}" value="MOBILE" />
                <span>转入移动</span>
            </label>
        </div>

        <div class="field">
            <label for="cellPhoneNumber">手机号</label>
            <input id="cellPhoneNumber" type="text" th:field="*{cellPhoneNumber}" maxlength="11" inputmode="numeric" placeholder="11位手机号" required />
        </div>

        <button class="action" type="submit">立即转网</button>
    </form>

    <div class="service" th:text="${serviceAddress}"></div>
</div>
</body>
</html>
