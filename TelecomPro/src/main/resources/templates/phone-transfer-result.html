<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>处理结果</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 24px;
        }
        .container {
            max-width: 560px;
            margin: 48px auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.10);
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        .success, .error {
            font-size: 22px;
            margin: 20px 0;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
        }
        .success {
            color: #166534;
            background: #dcfce7;
        }
        .error {
            color: #991b1b;
            background: #fee2e2;
        }
        .info {
            margin: 20px 0;
            padding: 16px;
            background: #eef2f7;
            border-radius: 12px;
            line-height: 1.8;
        }
        .info div {
            padding: 4px 0;
        }
        .info .label {
            color: #6b7280;
            font-size: 13px;
        }
        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #1368ce;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>处理结果</h1>

    <div th:class="${success} ? 'success' : 'error'" th:text="${info}"></div>

    <div class="info" th:if="${cellPhoneInfo}">
        <div><span class="label">手机号：</span><span th:text="${cellPhoneInfo.cellPhoneNumber}"></span></div>
        <div><span class="label">账户余额：</span><span th:text="${cellPhoneInfo.remainMoney}"></span> 元</div>
        <div><span class="label">套餐说明：</span><span th:text="${cellPhoneInfo.orderDesc}"></span></div>
        <div><span class="label">号码状态：</span><span th:text="${cellPhoneInfo.status == 0} ? '当前运营商号码' : '已转出号码'"></span></div>
        <div><span class="label">下一步：</span><span th:text="${nextStep}"></span></div>
    </div>

    <a class="btn" th:href="@{/}">返回首页</a>
</div>
</body>
</html>
