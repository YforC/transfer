<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转网结果</title>
    <style>
        :root {
            --surface: #dfe5ec;
            --text: #324252;
            --muted: #6f7f90;
            --ok: #3f7f62;
            --error: #b05a61;
            --shadow-high: -14px -14px 28px rgba(255,255,255,.88);
            --shadow-low: 14px 14px 28px rgba(163,177,198,.52);
            --shadow-inset: inset 8px 8px 16px rgba(163,177,198,.42), inset -8px -8px 16px rgba(255,255,255,.88);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top right, #edf1f6 0%, var(--surface) 48%, #d4dbe3 100%);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text);
        }
        .panel {
            width: min(100%, 460px);
            padding: 28px;
            border-radius: 30px;
            background: var(--surface);
            box-shadow: var(--shadow-high), var(--shadow-low);
        }
        h1 {
            margin: 0 0 22px;
            text-align: center;
            font-size: 28px;
        }
        .status {
            padding: 18px;
            border-radius: 22px;
            text-align: center;
            font-size: 18px;
            background: var(--surface);
            box-shadow: var(--shadow-inset);
            color: var(--text);
        }
        .status.ok { color: var(--ok); }
        .status.fail { color: var(--error); }
        .meta {
            margin: 18px 0 22px;
            padding: 18px;
            border-radius: 22px;
            background: var(--surface);
            box-shadow: var(--shadow-inset);
        }
        .row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 0;
            font-size: 14px;
        }
        .label { color: var(--muted); }
        .next {
            margin-top: 10px;
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }
        .back {
            display: block;
            width: 100%;
            min-height: 52px;
            line-height: 52px;
            text-align: center;
            text-decoration: none;
            color: #f7fbff;
            border-radius: 18px;
            background: linear-gradient(145deg, #6d88a3, #4f677f);
            box-shadow: 10px 10px 22px rgba(145,157,175,.55), -10px -10px 22px rgba(255,255,255,.8);
        }
    </style>
</head>
<body>
<div class="panel">
    <h1>转网结果</h1>
    <div th:class="${success} ? 'status ok' : 'status fail'" th:text="${info}"></div>

    <div class="meta" th:if="${cellPhoneInfo}">
        <div class="row">
            <span class="label">手机号</span>
            <span th:text="${cellPhoneInfo.cellPhoneNumber}"></span>
        </div>
        <div class="row">
            <span class="label">目标</span>
            <span th:text="${cellPhoneInfo.targetCarrier == 'MOBILE'} ? '移动' : '联通'"></span>
        </div>
    </div>

    <div class="next" th:text="${nextStep}"></div>
    <a class="back" th:href="@{/}">返回</a>
</div>
</body>
</html>
